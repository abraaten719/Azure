<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZFK-Tech World</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0078D4, #00B4D8);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background-color: white;
            color: #0078D4;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #005fa3;
            color: white;
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to AZFK-Tech World</h1>
        <p>Your gateway to cloud innovation, infrastructure, and modern technology solutions.</p>
        <button class="btn" onclick="alert('More features coming soon!')">Explore</button>
    </div>

    <footer>
        © 2026 AZFK-Tech World | Powered by Azure
    </footer>

</body>
</html>
